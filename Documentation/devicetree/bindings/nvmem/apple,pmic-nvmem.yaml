%YAML 1.2
---
$id: http://devicetree.org/schemas/nvmem/apple,pmic-nvmem.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Apple PMIC NVMEM

description: |
  This module is part of Apple PMICs. For more details see
  ../mfd/apple,pmic.yaml.

  NVMEM cells found in Apple PMICs are used to store information
  including RTC offset and boot failure count.

  See also bindings/nvmem/apple,spmi-nvmem.yaml which describes
  PMICs with only NVMEM functions exposed.

maintainers:
  - Nick Chan <towinchenmi@gmail.com>

allOf:
  - $ref: nvmem.yaml#

properties:
  compatible:
    const: apple,pmic-nvmem

  reg:
    maxItems: 1

required:
  - compatible
  - reg

unevaluatedProperties: false
...
